name: Production Release

on:
  push:
    tags:
      - 'v*'

jobs:
  production-build:
    name: Production Build & Submit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android (App Bundle)
        run: eas build --platform android --profile production --non-interactive
        env:
          APP_VARIANT: production
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Build iOS
        run: eas build --platform ios --profile production --non-interactive
        env:
          APP_VARIANT: production
          GOOGLE_SERVICES_PLIST: ${{ secrets.GOOGLE_SERVICES_PLIST_PROD }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

  deploy-functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    needs: production-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: Deploy functions and rules
        run: firebase deploy --only functions,firestore:rules,firestore:indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
